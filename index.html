<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Security</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
background:#00c6ff;
color:white;
}

.status{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h1>🔐 Smart Home Security</h1>
<button onclick="startListening()">🎤 Commande vocale</button>
<div class="status" id="status">Statut : En attente...</div>
</div>

<script>

const ESP_IP="10.43.73.108";

function startListening(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

recognition.lang="fr-FR";

recognition.start();

recognition.onresult=function(event){

let command=event.results[0][0].transcript.toLowerCase();

document.getElementById("status").innerHTML="Commande : "+command;

if(command.includes("active les lumieres")){
fetch(`http://${ESP_IP}/open`);
}

else if(command.includes("desactive les lumieres")){
fetch(`http://${ESP_IP}/close`);
}

else if(command.includes("mets le systeme en veille")){
fetch(`http://${ESP_IP}/sleep`);
}

else if(command.includes("active le systeme")){
fetch(`http://${ESP_IP}/wake`);
}

};

recognition.onerror=function(){
document.getElementById("status").innerHTML="Erreur de reconnaissance";
};

}

</script>

</body>
</html>
