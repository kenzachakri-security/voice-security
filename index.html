<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Security</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
}

h1{
margin-bottom:30px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00c6ff;
color:white;
}

button:hover{
background:#0072ff;
}

.status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔐 Smart Home Security</h1>

<button onclick="startListening()">🎤 Commande vocale</button>

<div class="status" id="status">
Statut : En attente...
</div>

</div>

<script>

const ESP_IP="172.20.10.3";

function startListening(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="fr-FR";
recognition.start();

recognition.onresult=function(event){

let command=event.results[0][0].transcript.toLowerCase();
command=command.normalize("NFD").replace(/[\u0300-\u036f]/g,"");

document.getElementById("status").innerHTML="Commande : "+command;


/* ===== ALLUMER ===== */

if(
command.includes("active les lumieres") ||
command.includes("allume les lumieres") ||
command.includes("allume lumiere")
)
{
 fetch(`http://${ESP_IP}/open`);
}
/* ===== ETEINDRE ===== */
else if(
command.includes("desactive les lumieres") ||
command.includes("eteins les lumieres") ||
command.includes("eteindre les lumieres") ||
command.includes("eteins lumiere")
){
fetch(`http://${ESP_IP}/close`);
}
  
/* ===== VEILLE ===== */
else if(
command.includes("mets le systeme en veille") ||
command.includes("veille systeme")
){
fetch(`http://${ESP_IP}/sleep`);
}
/* ===== ACTIVER ===== */
else if(
command.includes("active le systeme") ||
command.includes("reveil systeme")
){
fetch(`http://${ESP_IP}/wake`);
}

};


recognition.onerror=function(){

document.getElementById("status").innerHTML="Erreur vocale";

};

}

</script>

</body>

</html>
